        const CandleChart = ({ data }) => {
            if (!data || data.length === 0) return null;
            let minRaw = Math.min(...data.map(d => d.low));
            let maxRaw = Math.max(...data.map(d => d.high));
            const buffer = (maxRaw - minRaw) * 0.1;
            const minPrice = minRaw - buffer;
            const maxPrice = maxRaw + buffer;
            const range = maxPrice - minPrice;
            const widthPct = 100 / data.length;
            const lastCandle = data[data.length - 1];
            const lastPriceY = 100 - ((lastCandle.close - minPrice) / range * 100);

            // Generate Price Levels
            const priceLevels = [

                minPrice + (range * 0.75),
                minPrice + (range * 0.50),
                minPrice + (range * 0.25),

                                const isGreen = d.close >= d.open;

                                const yLow = 100 - ((d.low - minPrice) / range * 100);

            // Calculate Days Left Helper
            const calculateDaysLeft = (expiryStr) => {
                const today = new Date();

            // --- ADVANCED LICENSE CRYPTOGRAPHY (RC4 + Checksum + Hex Formatting) ---
            const SECRET_KEY = "RZ_BTC_PRO_MASTER_KEY_2026_X9!@#"; // Do not share this
            
            // RC4 Stream Cipher Algorithm
            const rc4 = (key, str) => {
                let s = [], j = 0, x, res = '';
                for (let i = 0; i < 256; i++) { s[i] = i; }
                for (let i = 0; i < 256; i++) {
                    j = (j + s[i] + key.charCodeAt(i % key.length)) % 256;
                    x = s[i]; s[i] = s[j]; s[j] = x;
                }
                let i = 0; j = 0;
                for (let y = 0; y < str.length; y++) {
                    i = (i + 1) % 256;
                    j = (j + s[i]) % 256;
                    x = s[i]; s[i] = s[j]; s[j] = x;
                    res += String.fromCharCode(str.charCodeAt(y) ^ s[(s[i] + s[j]) % 256]);
                }
                return res;
            };

            // String to Hex
            const toHex = (str) => Array.from(str).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
            
            // Hex to String
            const fromHex = (hex) => {
                let str = '';
                for (let i = 0; i < hex.length; i += 2) str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
                return str;
            };

            // Tamper-Proof Checksum Generator
            const generateChecksum = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    hash = ((hash << 5) - hash) + str.charCodeAt(i);
                    hash |= 0; 
                }
                return Math.abs(hash).toString(16).padStart(8, '0');
            };

            const encryptLicense = (data) => {
                const payload = JSON.stringify(data);
                const checksum = generateChecksum(payload);
                // Attach checksum before encryption to verify integrity later
                const fullData = checksum + "|" + payload;
                const encrypted = rc4(SECRET_KEY, fullData);
                const hex = toHex(encrypted).toUpperCase();
                // Format as professional segments: XXXXXXXX-XXXXXXXX-XXXXXXXX...
                return hex.match(/.{1,8}/g)?.join('-') || hex;
            };

            const decryptLicense = (key) => {
                try {
                    const cleanHex = key.replace(/-/g, '').toLowerCase();
                    const decrypted = rc4(SECRET_KEY, fromHex(cleanHex));
                    const delimiterIndex = decrypted.indexOf('|');
                    
                    if (delimiterIndex === -1) return null; // Corrupted key
                    
                    const checksum = decrypted.substring(0, delimiterIndex);
                    const payload = decrypted.substring(delimiterIndex + 1);
                    
                    // Verify Integrity (If someone modified the hex, checksum will fail)
                    if (generateChecksum(payload) !== checksum) return null; 
                    
                    return JSON.parse(payload);
                } catch(e) { 
                    return null; // Handle any decode errors silently
                }

                let gains=0, losses=0;
                for(let i=1; i<=period; i++) { const chg = closes[i]-closes[i-1]; if(chg>0) gains+=chg; else losses+=Math.abs(chg); }
                let avgGain = gains/period, avgLoss = losses/period;
                for(let i=period+1; i<closes.length; i++) { const chg = closes[i]-closes[i-1]; let g = chg>0?chg:0, l=chg<0?Math.abs(chg):0; avgGain=((avgGain*(period-1))+g)/period; avgLoss=((avgLoss*(period-1))+l)/period; }

                                                type="password" 
                                                value={loginPass}
                                                onChange={e => setLoginPass(e.target.value)}
                                                className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-orange-500 focus:outline-none transition-all focus:shadow-[0_0_15px_rgba(249,115,22,0.1)] text-sm font-bold tracking-wide pl-10"
                                                placeholder="••••••••"
                                                autoComplete="current-password"
                                            />
                                            <div className="absolute left-3 top-3 text-slate-500 group-focus-within:text-orange-500 transition-colors">
                                                <Lock size={16}/>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex items-center justify-between mt-2 ml-1">
                                        {/* Remember Me Checkbox */}
                                        <label className="flex items-center cursor-pointer checkbox-wrapper group">
                                            <input 
                                                type="checkbox" 
                                                className="hidden" 
                                                checked={rememberMe}
                                                onChange={(e) => setRememberMe(e.target.checked)}
                                            />
                                            <div className="w-4 h-4 border-2 border-slate-600 rounded flex items-center justify-center transition-colors group-hover:border-slate-500 bg-slate-900">
                                                <svg className="w-3 h-3 text-white hidden pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7" />
                                                </svg>
                                            </div>
                                            <span className="text-[10px] text-slate-400 font-bold ml-2 select-none group-hover:text-slate-300 uppercase tracking-wide">Remember Me</span>
                                        </label>

                                        {/* Forgot Password Link */}
                                        <button type="button" onClick={() => {setIsForgotPass(true); setLoginError("");}} className="text-[10px] text-orange-400 font-bold hover:text-orange-300 uppercase">
                                            Forgot Password?
                                        </button>
                                    </div>
                                    
                                    <button type="submit" className="w-full bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 py-3.5 rounded-xl font-bold text-white shadow-lg shadow-orange-900/20 transition-all active:scale-[0.98] mt-4 text-sm tracking-wide uppercase flex items-center justify-center gap-2 group border border-orange-400/20">
                                        Authenticate <ArrowRight size={16} className="group-hover:translate-x-1 transition-transform"/>
                                    </button>
                                </form>
                            )}

                            {/* --- TAB 1B: FORGOT PASSWORD (MASTER KEY) --- */}
                            {authMode === 'LOGIN' && isForgotPass && (
                                <form onSubmit={handleResetPassword} className="space-y-4">
                                    <div className="bg-red-900/20 border border-red-500/30 p-3 rounded-xl mb-2 text-center">
                                        <Shield size={20} className="text-red-400 mx-auto mb-1"/>
                                        <p className="text-[10px] text-red-400 uppercase font-bold">Admin Master Override</p>
                                        <p className="text-[9px] text-slate-400 mt-1">Requires Admin Master Key to reset user password.</p>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Target Username</label>
                                        <input type="text" value={resetUser} onChange={e => setResetUser(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-600 focus:border-red-500 focus:outline-none text-sm font-bold" placeholder="Username to reset" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">New Password</label>
                                        <input type="password" value={newPassInput} onChange={e => setNewPassInput(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-600 focus:border-red-500 focus:outline-none text-sm font-bold" placeholder="Set New Password" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-red-400 uppercase ml-1">Master Key</label>
                                        <input type="password" value={masterKeyInput} onChange={e => setMasterKeyInput(e.target.value)} className="w-full bg-slate-900 border border-red-900/50 rounded-xl px-4 py-2.5 text-white placeholder-slate-600 focus:border-red-500 focus:outline-none text-sm font-bold" placeholder="Enter Admin Master Key" />
                                    </div>

                                    <div className="flex gap-2 mt-4">
                                        <button type="button" onClick={() => {setIsForgotPass(false); setLoginError("");}} className="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-bold text-white text-xs uppercase transition-colors">
                                            Cancel
                                        </button>
                                        <button type="submit" className="flex-[2] bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 py-3 rounded-xl font-bold text-white shadow-lg shadow-red-900/20 transition-all active:scale-[0.98] text-xs uppercase flex items-center justify-center gap-2 border border-red-400/20">
                                            Force Reset <Shield size={14} />
                                        </button>
                                    </div>
                                </form>
                            )}

                            {/* --- TAB 2: ACTIVATE DEVICE --- */}
                            {authMode === 'ACTIVATE' && (
                                <form onSubmit={handleActivate} className="space-y-4">
                                    <div className="bg-blue-900/20 border border-blue-500/30 p-3 rounded-xl mb-2 text-center">
                                        <p className="text-[10px] text-blue-400 uppercase font-bold mb-1">Your Unique Device ID</p>
                                        <div className="flex items-center justify-center gap-2 cursor-pointer group" onClick={() => copyToClipboard(deviceId)}>
                                            <span className="text-lg font-mono font-black text-white tracking-wider group-hover:text-blue-300 transition-colors">{deviceId}</span>
                                            <CopyIcon size={16} className="text-blue-500 group-hover:text-blue-300"/>
                                        </div>
                                        <p className="text-[9px] text-slate-400 mt-2">Tap to copy & send to Admin for a License Key.</p>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 flex items-center gap-1"><Key size={10}/> Enter License Key</label>
                                        <div className="relative group">
                                            <input 
                                                type="text" 
                                                value={licenseKeyInput}
                                                onChange={e => setLicenseKeyInput(e.target.value)}
                                                className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-blue-500 focus:outline-none transition-all focus:shadow-[0_0_15px_rgba(59,130,246,0.1)] text-sm font-bold tracking-wide pl-10"
                                                placeholder="Paste License Key Here..."
                                            />
                                            <div className="absolute left-3 top-3 text-slate-500 group-focus-within:text-blue-500 transition-colors">
                                                <Key size={16}/>
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 py-3.5 rounded-xl font-bold text-white shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98] mt-4 text-sm tracking-wide uppercase flex items-center justify-center gap-2 group border border-blue-400/20">
                                        Activate License <Check size={16} className="group-hover:scale-110 transition-transform"/>
                                    </button>
                                </form>
                            )}

                            {/* Subscription Contact Info - Updated to Button for Share Logic */}
                            <div className="mt-6 pt-6 border-t border-slate-700/50 text-center">
                                <p className="text-[10px] text-slate-500 mb-3 font-medium uppercase tracking-wider">Access Required?</p>
                                <button 
                                    onClick={handleSubscription}
                                    className="w-full text-xs font-bold text-blue-400 hover:text-white flex items-center justify-center gap-2 bg-slate-700/50 py-3 rounded-xl border border-slate-600 hover:bg-blue-600 hover:border-blue-500 transition-all active:scale-95"
                                >
                                    <Share2 size={14}/> Get Subscription Plans
                                </button>
                            </div>

                            <div className="absolute bottom-2 left-0 w-full text-center">
                                <p className="text-[8px] text-slate-600 uppercase font-bold tracking-widest">
                                    Reezoon Trading Group • Secure v2.5
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-full flex flex-col bg-slate-900 text-white overflow-hidden pb-1 relative">
                    {/* NOTIFICATION POPUP */}
                    {notification && (
                        <div className="absolute top-24 left-4 right-4 z-50 notification-pop pointer-events-none">
                            <div className={`p-4 rounded-xl border-2 shadow-2xl flex items-center gap-3 backdrop-blur-md ${notification.type === 'buy' ? 'bg-green-900/90 border-green-500 text-white' : 'bg-red-900/90 border-red-500 text-white'}`}>
                                <Shield size={28} className="animate-pulse" />
                                <div><h4 className="font-bold text-lg leading-tight uppercase">Zone Alert!</h4><p className="text-sm font-medium">{notification.msg}</p></div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="bg-slate-800 border-b border-slate-700 px-4 pb-4 shrink-0 flex justify-between items-center z-10 shadow-md" style={{ paddingTop: 'calc(env(safe-area-inset-top) + 1rem)' }}>
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-2xl bg-gradient-to-tr from-orange-600 via-orange-500 to-yellow-400 flex items-center justify-center shadow-lg shadow-orange-500/20 border border-white/10 relative overflow-hidden group">
                                <div className="absolute top-0 left-0 w-full h-full bg-white/20 -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
                                <DollarSign size={28} className="text-white drop-shadow-md" strokeWidth={2.5} />
                            </div>
                            <div>
                                <h1 className="text-xl font-black tracking-tight text-white leading-none flex items-center gap-1">
                                   BTC PRO <span className="text-[10px] bg-blue-500/20 text-blue-400 px-1.5 py-0.5 rounded border border-blue-500/30 font-mono">LIVE</span>
                                </h1>
                                
                                {/* User Access Info in Header */}
                                <div className="flex items-center gap-2 mt-1">
                                    <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{currentUser || "User"}</span>
                                    <div className={`flex items-center gap-1 px-1.5 py-0.5 rounded ${daysRemaining < 5 ? 'bg-red-500/20 border border-red-500/30 text-red-400' : 'bg-green-500/20 border border-green-500/30 text-green-400'}`}>
                                        <Clock size={8} />
                                        <span className="text-[8px] font-bold font-mono">{daysRemaining > 3650 ? 'LIFETIME' : `${daysRemaining} Days`}</span>
                                    </div>
                                </div>

                                <div onClick={() => setActiveModal('session')} className="flex items-center gap-1.5 cursor-pointer mt-1 hover:opacity-80 transition-opacity">
                                    <div className={`w-2 h-2 rounded-full ${sessionData.active.length > 0 ? "bg-green-400 animate-pulse shadow-[0_0_8px_rgba(74,222,128,0.5)]" : "bg-slate-500"}`}></div>
                                    <span className={`text-xs font-bold tracking-wide ${sessionData.statusColor}`}>{sessionData.statusText}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={()=>setActiveModal('live_chart')} className="p-2 bg-slate-700 rounded-full hover:bg-slate-600 transition-colors relative group">
                                <CandlestickChart size={20} className="text-blue-400 group-hover:text-white transition-colors"/>
                                <div className="absolute top-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-slate-800 animate-pulse"></div>
                            </button>
                            <button onClick={()=>setActiveModal('news')} className="p-2 bg-slate-700 rounded-full relative"><Calendar size={20} className="text-slate-300"/><div className="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-slate-800 animate-pulse"></div></button>
                            <button onClick={()=>setActiveModal('settings')} className="p-2 bg-slate-700 rounded-full"><Settings size={20} className="text-slate-300"/></button>
                        </div>
                    </header>
                    
                    {/* PROFESSIONAL 5-SESSION TICKER */}
                    <div className="bg-slate-950 border-b border-slate-800 px-2 py-1.5 flex gap-2 overflow-x-auto no-scrollbar shrink-0">
                        {sessionData.details.map((s, i) => {
                            const isOverlapping = sessionData.hasOverlap && sessionData.active.includes(s.code);
                            return (
                                <div key={i} className={`shrink-0 flex flex-col justify-center px-3 py-1 rounded border min-w-[95px] transition-all relative ${s.isOpen ? 'bg-slate-800 border-slate-600 shadow-md' : 'bg-transparent border-transparent opacity-40 grayscale'} ${isOverlapping ? 'border-orange-500/50 shadow-orange-900/20' : ''}`}>
                                    {isOverlapping && <div className="absolute -top-1 -right-1 w-2 h-2 bg-orange-500 rounded-full animate-ping"></div>}
                                    <div className="flex justify-between items-center gap-2 mb-1">
                                        <span className={`text-[10px] font-bold tracking-wide ${s.color}`}>{s.n}</span>
                                        {s.isOpen && <div className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></div>}
                                    </div>
                                    {s.isOpen ? (
                                        <>
                                            <div className="w-full h-1 bg-slate-700 rounded-full overflow-hidden mb-0.5">
                                                <div className="h-full bg-blue-500 progress-bar" style={{ width: `${s.progress}%` }}></div>
                                            </div>
                                            <span className="text-[8px] text-slate-300 font-mono leading-none block text-right tracking-tight">{s.statusMsg.replace('Closes in ', '')} left</span>
                                        </>
                                    ) : (
                                        <span className="text-[8px] text-slate-500 leading-none block mt-1 font-mono tracking-tight">{s.statusMsg.replace('Opens in ', 'In ')}</span>
                                    )}
                                </div>
                            )
                        })}
                    </div>

                    {/* Main UI Structure */}
                    <main className="flex-1 flex flex-col p-2 gap-2 overflow-hidden">
                        <div className="flex gap-2 h-[20%] min-h-[90px]">
                            <div className="flex-1 bg-slate-800 rounded-xl p-3 border border-slate-700 relative flex flex-col justify-center">
                                <span className="text-slate-400 text-[10px] font-bold uppercase">Market Price</span>
                                <h2 className={`text-3xl font-bold tracking-tight ${flashClass ? flashClass : 'text-white'}`}>${dispPrice.toLocaleString(undefined, {maximumFractionDigits:0})}</h2>
                                <div className={`flex items-center gap-1 text-sm font-bold ${priceChange>=0?'text-green-400':'text-red-400'}`}>
                                    {priceChange>=0?<TrendingUp size={14}/>:<TrendingDown size={14}/>} <span>{priceChange?.toFixed(2)}%</span>
                                </div>
                            </div>
                            <div onClick={()=>setActiveModal('trend')} className="w-[40%] bg-slate-800 rounded-xl p-2 border border-slate-700 flex flex-col justify-center items-center text-center gap-1 cursor-pointer active:scale-95">
                                <span className="text-[9px] text-slate-400 font-bold uppercase flex items-center gap-1">Trend <Info size={8}/></span>
                                <span className={`text-xs font-bold ${priceChange>0.5?'text-green-400':priceChange<-0.5?'text-red-400':'text-yellow-400'}`}>{priceChange>0.5?'Bullish':priceChange<-0.5?'Bearish':'Neutral'}</span>
                                <div className="h-[1px] w-full bg-slate-700 my-1"></div>
                                <span className="text-[9px] text-slate-400 font-bold uppercase">Vol</span>
                                <span className={`text-[10px] font-bold ${sessionData.active.length>1?'text-orange-400':'text-slate-300'}`}>{sessionData.active.length>1?'High 🔥': 'Normal'}</span>
                            </div>
                        </div>

                        <div className="flex-1 min-h-0 flex flex-col justify-center relative items-center gap-2">
                             <div className="bg-slate-800/90 border border-slate-700 px-3 py-1 rounded-full flex items-center gap-2 text-xs backdrop-blur-sm z-10 shadow-sm">
                                <span className="text-slate-400 font-bold text-[9px] uppercase flex items-center gap-1"><ArrowUpCircle size={10} className="text-green-500"/> Daily High</span>
                                <span className="text-green-400 font-mono font-bold">${high24h.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
                             </div>

                             <div onClick={()=>setActiveModal('analysis')} className={`w-full flex-1 relative rounded-2xl border-2 flex flex-col items-center justify-center text-center shadow-2xl active:scale-[0.98] transition-all overflow-hidden ${getSignalBg(signal.type)}`}>
                                <CandleChart data={chartData} />
                                {/* IMPORTANT: Two Side-by-Side Signal Blocks */}
                                <div className="relative z-10 w-full px-2 flex gap-2 h-full py-2">
                                    
                                    {/* 1. TECHNICAL SIGNAL BLOCK */}
                                    <div onClick={(e)=>{e.stopPropagation(); setActiveModal('technical_details');}} className="flex-1 bg-slate-900/80 backdrop-blur-md rounded-xl border border-white/10 shadow-lg flex flex-col items-center justify-center p-2 cursor-pointer hover:bg-white/5 transition-colors">
                                        <span className="text-[8px] text-slate-400 uppercase tracking-widest font-bold mb-1">Technical</span>
                                        <div className="mb-1">
                                            {signal.type === 'BUY' && <ArrowUpCircle size={32} className="text-green-400 animate-bounce-slow" />}
                                            {signal.type === 'SELL' && <ArrowDownCircle size={32} className="text-red-400 animate-bounce-slow" />}
                                            {(signal.type === 'PREP_BUY' || signal.type === 'PREP_SELL' || signal.type === 'HOLD' || signal.type === 'HOLD_TIGHT') && <Hand size={32} className="text-yellow-400" />}
                                            {signal.type === 'WAIT' && <Activity size={32} className="text-slate-400" />}
                                        </div>
                                        <h3 className={`text-sm font-black tracking-tight leading-none text-center ${getSignalColor(signal.type)}`}>
                                            {signal.leaderText}
                                        </h3>
                                        
                                        {/* Display Wait Price for Watch Signals */}
                                        {(signal.type === 'PREP_BUY' || signal.type === 'PREP_SELL') && signal.waitPrice && (
                                            <div className="bg-slate-950/50 px-2 py-0.5 rounded border border-slate-700 mt-1">
                                                <span className="text-[9px] text-slate-400 font-mono">Wait: </span>
                                                <span className="text-[10px] font-bold text-white font-mono">${signal.waitPrice.toFixed(0)}</span>
                                            </div>
                                        )}

                                        <p className="text-[8px] text-slate-300 mt-1 font-mono text-center leading-tight">
                                            {signal.type === 'BUY' ? 'Demand Zone Reached' : 
                                             signal.type === 'SELL' ? 'Supply Zone Reached' : 
                                             signal.type.includes('PREP') ? 'Approaching Zone...' :
                                             'Mid Range / No Setup'}
                                        </p>
                                    </div>

                                    {/* 2. FUNDAMENTAL (NEWS) SIGNAL BLOCK */}
                                    <div onClick={(e)=>{e.stopPropagation(); setActiveModal('fundamental_details');}} className="flex-1 bg-slate-900/80 backdrop-blur-md rounded-xl border border-white/10 shadow-lg flex flex-col items-center justify-center p-2 cursor-pointer hover:bg-white/5 transition-colors">
                                        <span className="text-[8px] text-slate-400 uppercase tracking-widest font-bold mb-1">News Bias</span>
                                        <div className="mb-1">
                                            {funSignal.type === 'BUY' && <TrendingUp size={32} className="text-green-400" />}
                                            {funSignal.type === 'SELL' && <TrendingDown size={32} className="text-red-400" />}
                                            {funSignal.type === 'NEUTRAL' && <Activity size={32} className="text-yellow-400" />}
                                            {funSignal.type === 'HOLD' && <Activity size={32} className="text-slate-400" />}
                                        </div>
                                        <h3 className={`text-sm font-black tracking-tight leading-none text-center ${funSignal.type === 'BUY' ? 'text-green-400' : funSignal.type === 'SELL' ? 'text-red-400' : 'text-yellow-400'}`}>
                                            {funSignal.leaderText}
                                        </h3>
                                        <p className="text-[8px] text-slate-300 mt-1 font-mono text-center leading-tight">
                                            Based on ETF & Trends
                                        </p>
                                    </div>

                                </div>
                                {/* ADDED THIS LINE: Display "FILHAL WAIT KARYN" message for PREP signals */}
                                {(signal.type === 'PREP_BUY' || signal.type === 'PREP_SELL') && 
                                    <div className="absolute bottom-1 w-full text-center z-20"><span className="text-[9px] bg-yellow-500/90 text-black px-3 py-0.5 rounded-full font-bold uppercase tracking-widest animate-pulse shadow-lg">FILHAL WAIT KARYN ✋</span></div>
                                }
                            </div>

                            <div className="bg-slate-800/90 border border-slate-700 px-3 py-1 rounded-full flex items-center gap-2 text-xs backdrop-blur-sm z-10 shadow-sm">
                                <span className="text-slate-400 font-bold text-[9px] uppercase flex items-center gap-1"><ArrowDownCircle size={10} className="text-red-500"/> Daily Low</span>
                                <span className="text-red-400 font-mono font-bold">${low24h.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
                             </div>
                        </div>

                        <div className="grid grid-cols-2 gap-2 h-[25%] min-h-[110px] shrink-0 mb-safe mt-1">
                             <div className="rounded-xl border border-slate-700 bg-slate-800 flex flex-col justify-center divide-y divide-slate-700">
                                <div className="flex-1 flex flex-col justify-center items-center bg-red-900/10">
                                     <div className="flex items-center gap-1 text-red-400 mb-1"><TrendingUp size={12} className="rotate-180"/> <span className="text-[10px] font-bold uppercase">Supply (Sell)</span></div>
                                     <span className="text-lg font-mono font-bold text-white tracking-wide">${dispSupL.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
                                </div>
                                <div className="flex-1 flex flex-col justify-center items-center bg-green-900/10 border-t border-slate-700">
                                     <div className="flex items-center gap-1 text-green-400 mb-1"><TrendingUp size={12}/> <span className="text-[10px] font-bold uppercase">Demand (Buy)</span></div>
                                     <span className="text-lg font-mono font-bold text-white tracking-wide">${dispDemH.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
                                </div>
                             </div>
                             <div onClick={()=>setActiveModal('rsi')} className="bg-slate-800 rounded-xl border border-slate-700 flex flex-col justify-center p-3 text-center cursor-pointer hover:bg-slate-700/50">
                                 <div className="flex justify-between items-end mb-1">
                                     <span className="text-[9px] text-slate-500 uppercase font-bold flex items-center gap-1">RSI Strength <Maximize size={8}/></span>
                                     <span className={`text-xs font-bold ${rsi>70?'text-red-400':rsi<30?'text-green-400':'text-blue-400'}`}>{rsi}</span>
                                 </div>
                                 <div className="relative w-full h-8 flex items-end justify-between gap-0.5 mb-2">
                                     {[...Array(10)].map((_, i) => (
                                         <div key={i} className={`w-full rounded-sm transition-all duration-500 ${i<(rsi/10)?(rsi>70?'bg-red-500':rsi<30?'bg-green-500':'bg-blue-500'):'bg-slate-700'}`} style={{ height: `${(i+1)*10}%` }}></div>
                                     ))}
                                 </div>
                                 <div className="bg-slate-900/50 rounded p-1"><p className="text-[9px] text-slate-300 leading-tight">{rsi>70?"Overbought (Risk)":rsi<30?"Oversold (Opp)":"Neutral Zone"}</p></div>
                             </div>
                        </div>
                    </main>

                    {/* --- MODALS --- */}
                    {activeModal && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 animate-in fade-in duration-200" onClick={()=>{setActiveModal(null); setIsLandscape(false);}}>
                            <div 
                                className={`bg-slate-800 w-full flex flex-col relative shadow-2xl transition-all ${
                                    activeModal === 'live_chart' 
                                    ? (isLandscape 
                                        ? 'bg-slate-900 border-0 p-0' // Fixed styles are handled in style prop below
                                        : 'h-full md:h-[90vh] md:max-w-5xl rounded-none md:rounded-2xl p-2 md:p-4 border-0 md:border border-slate-600')
                                    : 'max-w-sm max-h-[85vh] rounded-2xl p-5 border border-slate-600'
                                }`} 
                                style={isLandscape ? {
                                    position: 'fixed',
                                    top: '50%',
                                    left: '50%',

                                                                        </div>
                                                                    )}
                                                                    {(!h.urdu?.sentiment || h.urdu?.sentiment === 'Neutral' || h.urdu?.sentiment === 'Critical') && (
                                                                        <div className="flex items-center gap-1 bg-yellow-500/10 px-1.5 py-0.5 rounded border border-yellow-500/20">
                                                                            <Activity size={12} className="text-yellow-400"/>
                                                                            <span className="text-[9px] font-bold text-yellow-400 uppercase">Neutral</span>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                                <span className="text-[9px] text-slate-500">{h.displayTime}</span>
                                                            </div>
                                                            <h5 className="text-xs font-bold text-white line-clamp-2 leading-tight mb-2 group-hover:text-blue-300 transition-colors">
                                                                {h.title}
                                                            </h5>
                                                            <div className="flex items-center gap-1">
                                                                <div className="h-[1px] flex-1 bg-slate-700"></div>
                                                                <span className="text-[9px] text-slate-400 flex items-center gap-1 group-hover:text-white">
                                                                    Tap for Urdu Analysis <ArrowRight size={10}/>
                                                                </span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                    {newsData.headlines.length === 0 && (
                                                        <div className="text-center py-4 text-xs text-slate-500">Loading News...</div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </>
                                )}
                                
                                {activeModal === 'rsi' && (
                                    <>
                                        <h3 className="font-bold text-white mb-4 flex gap-2 items-center">
                                            <Activity size={20} className="text-blue-400"/> RSI Momentum (14)
                                        </h3>
                                        
                                        <div className="flex flex-col items-center justify-center mb-6">
                                            <span className="text-5xl font-black text-white tracking-tighter">{rsi}</span>
                                            <span className={`px-3 py-1 rounded-full text-xs font-bold uppercase mt-2 ${rsi > 70 ? 'bg-red-500/20 text-red-400' : rsi < 30 ? 'bg-green-500/20 text-green-400' : 'bg-slate-700 text-slate-300'}`}>
                                                {rsi > 70 ? 'OVERBOUGHT' : rsi < 30 ? 'OVERSOLD' : 'NEUTRAL ZONE'}
                                            </span>
                                        </div>

                                        <div className="relative h-8 w-full bg-slate-800 rounded-full mb-2 overflow-hidden border border-slate-600">
                                            <div className="absolute left-0 top-0 h-full w-[30%] bg-green-500/30 border-r border-slate-600"></div>
                                            <div className="absolute left-[30%] top-0 h-full w-[40%] bg-slate-500/10"></div>
                                            <div className="absolute right-0 top-0 h-full w-[30%] bg-red-500/30 border-l border-slate-600"></div>
                                            
                                            <div 
                                                className="absolute top-0 bottom-0 w-1 bg-white shadow-[0_0_10px_white] transition-all duration-500 ease-out z-10"
                                                style={{ left: `${rsi}%` }}
                                            ></div>
                                        </div>
                                        
                                        <div className="flex justify-between text-[10px] text-slate-500 font-mono mb-6 px-1">
                                            <span>0</span><span className="text-green-400 font-bold">30</span><span>50</span><span className="text-red-400 font-bold">70</span><span>100</span>
                                        </div>

                                        <div className="bg-slate-900 p-4 rounded-xl border border-slate-700 space-y-2">
                                            <div className="flex justify-between items-center border-b border-slate-800 pb-2">
                                                <span className="text-xs text-slate-400">Condition</span>
                                                <span className="text-sm text-white font-bold">
                                                    {rsi > 70 ? "Selling High" : rsi < 30 ? "Buying Low" : "Trend Following"}
                                                </span>
                                            </div>
                                            
                                            <div className="pt-1">
                                                <span className="text-xs text-slate-400 block mb-1">Trading Advice:</span>
                                                <p className="text-sm text-slate-300 leading-relaxed">
                                                    {rsi >= 70 ? "Market heavily overbought hai. Buying risky hai. Reversal pattern ya divergence ka wait karein phir Short (Sell) karein." : rsi <= 30 ? "Market heavily oversold hai. Selling risky hai. Support rejection ka wait karein phir Long (Buy) karein." : "Market momentum neutral hai. Price Action aur Trend lines ko follow karein. Beach main trade avoid karein."}
                                                </p>
                                            </div>
                                        </div>
                                    </>
                                )}
                                
                                {activeModal === 'news' && (
                                    <>
                                        <h3 className="font-bold text-white mb-4 flex gap-2 items-center"><Calendar size={20} className="text-red-400"/> News Center</h3>
                                        <div className="flex gap-2 mb-4">
                                            <button onClick={()=>setActiveNewsTab('calendar')} className={`flex-1 py-1 text-xs rounded ${activeNewsTab==='calendar'?'bg-slate-600 text-white':'text-slate-400'}`}>Calendar</button>
                                            <button onClick={()=>setActiveNewsTab('headlines')} className={`flex-1 py-1 text-xs rounded ${activeNewsTab==='headlines'?'bg-slate-600 text-white':'text-slate-400'}`}>Headlines</button>
                                            <button onClick={()=>setActiveNewsTab('etf')} className={`flex-1 py-1 text-xs rounded ${activeNewsTab==='etf'?'bg-slate-600 text-white':'text-slate-400'}`}>ETF</button>
                                        </div>
                                        <div className="overflow-y-auto flex-1 space-y-2">
                                            {activeNewsTab==='calendar' && newsData.calendar.map((n,i)=>(
                                                <div key={i} onClick={() => setSelectedNews(n)} className={`bg-slate-700/30 p-2 rounded border border-slate-700 flex justify-between items-center hover:bg-slate-700/50 cursor-pointer`}>
                                                    <div><div className="text-[10px] text-slate-400">{n.displayTime}</div><div className="text-xs font-bold text-white">{n.title}</div></div>
                                                    <div className="text-[10px] font-mono text-right"><div>F: {n.fcst}</div><div className={n.isPassed?'text-slate-500':'text-green-400'}>{n.isPassed?'Released':getCountdown(n.eventDate)}</div></div>
                                                </div>
                                            ))}
                                            {activeNewsTab==='etf' && (
                                                <div className="space-y-2">
                                                    <div className="bg-slate-800 p-3 rounded-lg border border-slate-700 text-center">
                                                        <div className="text-[10px] uppercase text-slate-400">Net Daily Flow</div>
                                                        <div className={`text-xl font-bold ${newsData.etf.total>0?'text-green-400':'text-red-400'}`}>{newsData.etf.total>0?'+':''}{newsData.etf.total}M USD</div>
                                                    </div>
                                                    {newsData.etf.list.map((e,i)=>(
                                                        <div key={i} className="flex justify-between text-xs p-2 bg-slate-900/50 rounded">
                                                            <span>{e.ticker}</span><span className={e.flow>0?'text-green-400':'text-red-400'}>{e.flow}M</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                            {activeNewsTab==='headlines' && newsData.headlines.map((h,i)=>(
                                                <div key={i} onClick={() => setSelectedNews({...h, isHeadline: true})} className="block p-2 bg-slate-700/30 rounded border border-slate-700 text-xs hover:bg-slate-700/50 flex gap-2 cursor-pointer">
                                                    <div className="w-12 h-12 bg-slate-800 rounded shrink-0 overflow-hidden"><img src={h.imageurl} className="w-full h-full object-cover" onError={(e)=>e.target.style.display='none'}/></div>
                                                    <div><div className="font-bold line-clamp-2">{h.title}</div><div className="text-[9px] text-slate-400 mt-1">{h.source_info?.name}</div></div>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}
                                
                                {activeModal === 'trend' && (
                                    <>
                                        <h3 className="font-bold text-white mb-4 flex gap-2 items-center"><BarChart size={20} className="text-purple-400"/> Trend Analysis</h3>
                                        <div className="space-y-2 text-sm text-slate-300">
                                            <p>Trend based on M15 structure and volume. <br/> Current Bias: <strong className="text-white">{trendInfo.label}</strong></p>
                                        </div>
                                    </>
                                )}

                                {activeModal === 'live_chart' && (
                                    <>
                                        <div className={`flex justify-between items-center ${isLandscape ? 'mb-1 px-4 mt-2' : 'mb-2'}`}>
                                            <h3 className="font-bold text-white flex gap-2 items-center shrink-0"><BarChart size={20} className="text-blue-400"/> Live Market Chart</h3>
                                            
                                            {/* Rotate Button */}
                                            <button 
                                                onClick={() => setIsLandscape(!isLandscape)} 
                                                className={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold transition-all border ${isLandscape ? 'bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-500/30' : 'bg-slate-700 border-slate-600 text-slate-300 hover:bg-slate-600'}`}
                                            >
                                                <RotateCw size={14} className={isLandscape ? "-rotate-90" : ""} />
                                                {isLandscape ? "Normal View" : "Rotate View"}
                                            </button>
                                        </div>

                                        <div className="w-full flex-1 bg-slate-900 rounded-xl overflow-hidden border border-slate-700 relative min-h-0">
                                            <div className="absolute inset-0 flex items-center justify-center text-slate-500 text-xs">Loading Chart...</div>
                                            <iframe 
                                                src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_76d87&symbol=BINANCE%3ABTCUSDT&interval=15&hidesidetoolbar=1&hidetoptoolbar=1&symboledit=1&saveimage=1&toolbarbg=0f172a&studies=[]&hideideas=1&theme=Dark&style=1&timezone=Asia%2FKarachi&studies_overrides={}&overrides={}&enabled_features=[]&disabled_features=[]&locale=en&utm_source=localhost&utm_medium=widget&utm_campaign=chart&utm_term=BINANCE%3ABTCUSDT" 
                                                className="w-full h-full relative z-10"
                                                frameBorder="0"
                                                allowtransparency="true"
                                                allowFullScreen>
                                            </iframe>
                                        </div>
                                        <div className="mt-2 text-[10px] text-center text-slate-400 shrink-0">
                                            Source: TradingView • M15 Timeframe
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {selectedNews && (
                        <div className="fixed inset-0 bg-black/95 z-[60] flex items-center justify-center p-4" onClick={() => setSelectedNews(null)}>
                            <div className="bg-slate-800 w-full max-w-sm rounded-2xl p-6 border-2 border-slate-600 relative shadow-2xl animate-in zoom-in-95 duration-200" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedNews(null)} className="absolute top-4 right-4 text-slate-400 hover:text-white bg-slate-700/50 p-2 rounded-full"><X size={20}/></button>
                                
                                {/* Source Badge */}
                                <div className="flex items-center gap-2 mb-3">
                                    <span className="bg-blue-600 text-white text-[10px] px-2 py-1 rounded font-bold uppercase tracking-wider shadow-lg">
                                        {selectedNews.source_info?.name || 'News Source'}
                                    </span>
                                    {selectedNews.isHeadline && (
                                        <span className="bg-red-500 text-white text-[10px] px-2 py-1 rounded font-bold uppercase tracking-wider">High Impact</span>
                                    )}
                                </div>

                                <h3 className="text-xl font-bold text-white mb-2 leading-tight">{selectedNews.title}</h3>
                                <p className="text-sm text-slate-400 mb-4 font-mono">{selectedNews.displayTime || 'Just Now'} | {selectedNews.currency || 'CRYPTO'}</p>
                                
                                {!selectedNews.isHeadline && selectedNews.isPassed ? (<><div className="grid grid-cols-3 gap-2 mb-4"><div className="bg-slate-900 p-2 rounded-lg border border-slate-700 text-center"><span className="block text-[10px] text-slate-500 uppercase font-bold mb-1">Actual</span><span className={`text-sm font-mono font-bold ${selectedNews.direction === 'Bullish' ? 'text-green-400' : 'text-red-400'}`}>{selectedNews.actual}</span></div><div className="bg-slate-900 p-2 rounded-lg border border-slate-700 text-center"><span className="block text-[10px] text-slate-500 uppercase font-bold mb-1">Forecast</span><span className="text-sm font-mono text-white">{selectedNews.fcst}</span></div><div className="bg-slate-900 p-2 rounded-lg border border-slate-700 text-center"><span className="block text-[10px] text-slate-500 uppercase font-bold mb-1">Previous</span><span className="text-sm font-mono text-white">{selectedNews.prev}</span></div></div></>) : null}
                                
                                <div className="bg-slate-900/80 p-4 rounded-xl border border-slate-700 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-2 opacity-5"><FileText size={80}/></div>
                                    <h4 className="text-blue-400 text-xs font-bold uppercase mb-2 flex items-center gap-2 relative z-10"><Info size={14}/> Urdu Khulasa (Summary)</h4>
                                    <p className="text-slate-200 text-sm leading-relaxed relative z-10">
                                        {selectedNews.urdu?.text || selectedNews.urduAnalysis?.text || (typeof selectedNews.urdu === 'string' ? selectedNews.urdu : "Analysis loading...")}
                                    </p>
                                </div>
                                
                                {selectedNews.isHeadline && (
                                    <a href={selectedNews.url} target="_blank" className="flex items-center justify-center gap-2 w-full text-center mt-4 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-white text-sm border border-slate-600 transition-all">
                                        Read Original on {selectedNews.source_info?.name || 'Source'} <LinkIcon size={14}/>
                                    </a>
                                )}
                                
                                <button onClick={() => setSelectedNews(null)} className="w-full mt-2 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-white shadow-lg">Close</button>
                            </div>
                        </div>
                    )}

                    {selectedHistoryItem && (
                        <div className="fixed inset-0 bg-black/95 z-[70] flex items-center justify-center p-4" onClick={() => setSelectedHistoryItem(null)}>
                            <div className="bg-slate-800 w-full max-w-sm rounded-2xl p-6 border-2 border-slate-600 relative shadow-2xl animate-in zoom-in-95 duration-200" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedHistoryItem(null)} className="absolute top-4 right-4 text-slate-400 hover:text-white bg-slate-700/50 p-2 rounded-full"><X size={20}/></button>
                                
                                <div className="flex items-center gap-2 mb-4">
                                     <HistoryIcon size={20} className="text-blue-400"/>
                                     <span className="text-slate-400 font-bold text-xs uppercase">Historical Record</span>
                                </div>

                                <div className="bg-slate-900/80 p-4 rounded-xl border border-slate-700 mb-4 text-center">
                                     <div className="text-xs text-slate-500 font-bold uppercase mb-1">Trigger Price</div>
                                     <div className="text-3xl font-bold text-white tracking-tight">${selectedHistoryItem.price.toFixed(0)}</div>
                                     <div className="text-xs text-slate-500 font-mono mt-2 flex justify-center gap-4">
                                        <span>📅 {selectedHistoryItem.time.toLocaleDateString()}</span>
                                        <span>⏰ {selectedHistoryItem.time.toLocaleTimeString()}</span>
                                     </div>
                                </div>

                                <div className="bg-slate-900/80 p-4 rounded-xl border border-slate-700 relative overflow-hidden mb-4">
                                    <div className={`absolute top-0 right-0 p-2 opacity-10 ${getSignalColor(selectedHistoryItem.type)}`}>
                                        {selectedHistoryItem.type === 'BUY' ? <TrendingUp size={80}/> : selectedHistoryItem.type === 'SELL' ? <TrendingDown size={80}/> : <Activity size={80}/>}
                                    </div>
                                    <h4 className={`text-sm font-bold uppercase mb-2 ${getSignalColor(selectedHistoryItem.type)} relative z-10 flex items-center gap-2`}>
                                        {selectedHistoryItem.leaderText}
                                    </h4>
                                    <div className="h-[1px] w-full bg-slate-700/50 mb-2"></div>
                                    <h5 className="text-[10px] text-slate-400 uppercase font-bold mb-1">Logic / Reason:</h5>
                                    <p className="text-sm text-slate-200 leading-relaxed font-sans relative z-10">{selectedHistoryItem.urdu}</p>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => shareHistoryItemToWhatsapp(selectedHistoryItem)} className="flex items-center justify-center gap-2 py-3 bg-[#25D366] hover:bg-[#20bd5a] rounded-xl font-bold text-white text-sm shadow-lg transition-transform active:scale-95">
                                        <Share2 size={18} /> Share
                                    </button>
                                    <button onClick={() => setSelectedHistoryItem(null)} className="py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-white shadow-lg transition-transform active:scale-95">
                                        Close
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BitcoinSignalApp />);
    </script>
</body>
</html>
